name: Create Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Environment
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle | head -1 | awk -F'\"' '{print $2}')
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "LANE=beta" >> $GITHUB_ENV
            echo "APP_VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          else
            echo "LANE=deploy" >> $GITHUB_ENV
            echo "APP_VERSION_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Create release.keystore
        env:
          AUTH: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo $AUTH | base64 --decode > /tmp/release.keystore
        shell: bash

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7.2'

      - name: Publish to Google Play
        uses: maierj/fastlane-action@v3.1.0
        env:
          APP_SIGN_KEYSTORE_PATH: /tmp/release.keystore
          APP_SIGN_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          APP_SIGN_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          APP_SIGN_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          APP_VERSION_CODE: ${{ github.run_number }}
          APP_VERSION_NAME: ${{ env.APP_VERSION_NAME }}
          SUPPLY_JSON_KEY_DATA: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        with:
          lane: ${{ env.LANE }}
          subdirectory: fastlane
